<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hospital Admin | ICU Predict</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">
    <nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="index.html">
                <i class="fa-solid fa-hotel text-teal me-2"></i>
                <span>Hospital Admin Portal</span>
            </a>
            <div class="ms-auto d-flex align-items-center">
                <div class="text-end me-3">
                    <p class="mb-0 small fw-bold">Mayo Clinic Central</p>
                    <p class="mb-0 x-small text-muted">Administrator</p>
                </div>
                <a href="login.html" class="btn btn-outline-teal btn-sm">Logout</a>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <div class="row g-4 mb-5">
            <div class="col-md-4">
                <div class="p-5 bg-teal text-white rounded-4 shadow">
                    <h1 class="fw-bold mb-0">84</h1>
                    <p class="mb-0 opacity-75">Active ICU Beds</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="p-5 bg-white rounded-4 shadow-sm border">
                    <h1 class="fw-bold mb-0">3,412</h1>
                    <p class="mb-0 text-muted">Weekly Predictions</p>
                </div>
            </div>
            <div class="col-md-4">
                <div class="p-5 bg-white rounded-4 shadow-sm border">
                    <h1 class="fw-bold mb-0">12</h1>
                    <p class="mb-0 text-muted">Active Doctor Staff</p>
                </div>
            </div>
        </div>

        <div class="row g-4">
            <div class="col-lg-8">
                <div class="bg-white p-5 rounded-4 shadow-sm h-100">
                    <h4 class="fw-bold mb-4">Department Performance</h4>
                    <div class="mb-4">
                        <div class="d-flex justify-content-between mb-1">
                            <span class="small fw-bold">Cardiology ICU</span>
                            <span class="small text-muted">98% Accuracy</span>
                        </div>
                        <div class="progress" style="height: 8px;">
                            <div class="progress-bar bg-teal" role="progressbar" style="width: 98%"></div>
                        </div>
                    </div>
                    <div class="mb-4">
                        <div class="d-flex justify-content-between mb-1">
                            <span class="small fw-bold">Neurology ICU</span>
                            <span class="small text-muted">92% Accuracy</span>
                        </div>
                        <div class="progress" style="height: 8px;">
                            <div class="progress-bar bg-primary" role="progressbar" style="width: 92%"></div>
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-lg-4">
                <div class="bg-white p-5 rounded-4 shadow-sm h-100">
                    <h5 class="fw-bold mb-3">Quick Actions</h5>
                    <button class="btn btn-outline-teal w-100 mb-3 py-3 rounded-3 text-start"><i class="fa-solid fa-user-doctor me-2"></i> Register New Doctor</button>
                    <button class="btn btn-outline-teal w-100 mb-3 py-3 rounded-3 text-start"><i class="fa-solid fa-file-medical me-2"></i> Export Data Logs</button>
                    <button class="btn btn-outline-teal w-100 py-3 rounded-3 text-start"><i class="fa-solid fa-gear me-2"></i> System Settings</button>
                </div>
            </div>
        </div>
    </div>
    <script src="https://code.jquery.com/jquery-3.6.4.min.js"></script>
    <script src="script.js"></script>
</body>
</html>
